# ============================================================
# PR Risk Analyzer - GitHub Actions Workflow
# ============================================================
# Triggers on pull_request events: opened, synchronize, reopened
# Runs a hybrid risk assessment combining:
#   1. Deterministic scoring rules (deterministic)
#   2. Qualitative AI Review (local LLM / Phi-3)
# ============================================================

name: PR Risk Analyzer

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Ensure only one analysis runs per PR at a time
concurrency:
  group: pr-risk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  analyze-risk:
    name: Analyze PR Risk
    runs-on: self-hosted

    # Required permissions to read PR data and write comments
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install dependencies for the analyzer script
      - name: Install dependencies
        run: |
          cd .github/scripts/pr-risk-analyzer
          npm install

      - name: Run PR Risk Analysis
        id: risk-analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Local LLM Configuration (accessible via self-hosted runner)
          LLM_ENDPOINT: "http://localhost:11434/v1"
          LLM_MODEL: "phi3"
        run: npx tsx .github/scripts/pr-risk-analyzer/index.ts
