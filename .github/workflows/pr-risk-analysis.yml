# ============================================================
# PR Risk Analyzer - GitHub Actions Workflow
# ============================================================
# Triggers on pull_request events: opened, synchronize, reopened
# Runs a hybrid risk assessment combining:
#   1. Deterministic scoring rules (deterministic)
#   2. Qualitative AI Review (local LLM / Phi-3)
# ============================================================

name: PR Risk Analyzer

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Ensure only one analysis runs per PR at a time
concurrency:
  group: pr-risk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  analyze-risk:
    name: Analyze PR Risk
    runs-on: self-hosted

    # Required permissions to read PR data and write comments
    permissions:
      pull-requests: write
      contents: write

    defaults:
      run:
        shell: cmd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install dependencies for the analyzer script
      - name: Install dependencies
        working-directory: .github\scripts\pr-risk-analyzer
        run: npm install

      - name: Test Connectivity to Ollama
        run: |
          echo "Checking connection to Ollama at 127.0.0.1:11434..."
          curl -s http://127.0.0.1:11434 || echo "⚠️ Ollama not reachable via 127.0.0.1"

      - name: Run PR Risk Analysis
        id: risk-analysis
        working-directory: .github\scripts\pr-risk-analyzer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Local LLM Configuration (accessible via self-hosted runner)
          LLM_ENDPOINT: "http://127.0.0.1:11434/v1"
          LLM_MODEL: "gemma4:e2b"
        run: npx tsx index.ts

      - name: Persist AI Memory
        if: always()
        run: |
          git config --global user.name "PR AI Auditor"
          git config --global user.email "ai-auditor@github.com"
          git add audit_memory.md
          git commit -m "chore(ai): update project context memory [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
