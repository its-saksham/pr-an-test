name: Retry AI PR Analysis

on:
  schedule:
    # Run every 3 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  find-and-retry:
    name: Find PRs and Retry AI Analysis
    runs-on: self-hosted

    permissions:
      pull-requests: write
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: .github/scripts/pr-risk-analyzer
        run: npm install

      - name: Find pending PRs and run analysis
        working-directory: .github/scripts/pr-risk-analyzer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          # Local LLM Configuration (accessible via self-hosted runner)
          LLM_ENDPOINT: "http://127.0.0.1:11434/v1"
          LLM_MODEL: "gemma4:e2b"
        run: |
          # Fetch all open PRs with the 'ai-analysis-pending' label
          PENDING_PRS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/issues?state=open&labels=ai-analysis-pending" \
            | jq -r '.[].number')

          if [ -z "$PENDING_PRS" ]; then
            echo "No PRs found with the 'ai-analysis-pending' label."
            exit 0
          fi

          echo "Found pending PRs: $PENDING_PRS"

          for PR_NUMBER in $PENDING_PRS; do
            echo "----------------------------------------"
            echo "Retrying analysis for PR #$PR_NUMBER"
            echo "----------------------------------------"
            
            # Re-fetch PR details to get BASE_SHA and HEAD_SHA
            PR_DATA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/pulls/$PR_NUMBER")
            BASE_SHA=$(echo "$PR_DATA" | jq -r '.base.sha')
            HEAD_SHA=$(echo "$PR_DATA" | jq -r '.head.sha')
            
            export PR_NUMBER="$PR_NUMBER"
            export BASE_SHA="$BASE_SHA"
            export HEAD_SHA="$HEAD_SHA"
            
            # Run the analyzer
            npx tsx index.ts
            
            echo "Completed retry attempt for PR #$PR_NUMBER"
          done

      - name: Persist AI Memory
        if: always()
        run: |
          git config --global user.name "PR AI Auditor"
          git config --global user.email "ai-auditor@github.com"
          git add audit_memory.md
          git commit -m "chore(ai): update project context memory from retry [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
